<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ComfyUI Replay</title>
<style>
  :root { --bg:#0e0f12; --fg:#e7ebf3; --muted:#9aa3b2; --accent:#5cd5fd; --ok:#34d399; --warn:#fbbf24; --err:#ef4444; --line:#22262e; }
  html, body { background: var(--bg); color: var(--fg); margin: 0; padding: 0; height: 100%; font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; }
  body { display: flex; flex-direction: column; }

  /* Top toolbar */
  .toolbar { flex: 0 0 auto; background: #15171c; border-bottom: 1px solid var(--line); padding: 8px 10px; display: flex; flex-direction: column; gap: 6px; }
  .toolbar-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .toolbar-row > .label { font-size: 11px; color: var(--muted); }
  #status-tab { font-size: 11px; color: var(--muted); }
  #status-tab b { color: var(--fg); }
  button { background: #1c2129; color: var(--fg); border: 1px solid var(--line); border-radius: 5px; padding: 5px 10px; cursor: pointer; font: inherit; font-size: 12px; }
  button:hover:not(:disabled) { border-color: #3a4150; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button.primary { background: var(--accent); color: #0a0c10; border-color: var(--accent); font-weight: 600; }
  button.primary:hover:not(:disabled) { filter: brightness(1.1); }
  select { background: #1c2129; color: var(--fg); border: 1px solid var(--line); border-radius: 5px; padding: 4px 6px; font: inherit; font-size: 12px; }

  /* Generator iframe — takes all remaining vertical space */
  #gen-frame { flex: 1 1 auto; width: 100%; border: 0; background: var(--bg); display: block; }

  /* Bottom log + settings */
  .bottom { flex: 0 0 auto; background: #0a0c10; border-top: 1px solid var(--line); padding: 8px 10px; }
  #log { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 11px; color: var(--muted); max-height: 120px; overflow-y: auto; white-space: pre-wrap; }
  #log .ok   { color: var(--ok); }
  #log .warn { color: var(--warn); }
  #log .err  { color: var(--err); }
  #log .info { color: var(--accent); }

  details.settings { margin-top: 6px; }
  details.settings summary { cursor: pointer; font-size: 11px; color: var(--muted); user-select: none; }
  details.settings .body { margin-top: 6px; display: flex; flex-direction: column; gap: 6px; }
  details.settings input[type=text], details.settings input[type=password] { background: #15171c; color: var(--fg); border: 1px solid var(--line); border-radius: 4px; padding: 5px; font: inherit; font-size: 12px; width: 100%; box-sizing: border-box; }
  details.settings label { display: flex; flex-direction: column; gap: 3px; font-size: 11px; color: var(--muted); }
</style>
</head>
<body>

<div class="toolbar">
  <div class="toolbar-row">
    <span class="label">Tab:</span>
    <span id="status-tab"><b>checking…</b></span>
  </div>
  <div class="toolbar-row">
    <span class="label">VO:</span>
    <select id="opt-vo-source">
      <option value="bundled" selected>Bundled MP3s (Example 1)</option>
      <option value="elevenlabs">ElevenLabs (live)</option>
      <option value="none">No audio</option>
    </select>
    <span class="label" style="margin-left:6px;">Record:</span>
    <select id="opt-record">
      <option value="tab" selected>Tab (no picker)</option>
      <option value="screen">Pick from picker</option>
      <option value="off">Off</option>
    </select>
  </div>
  <div class="toolbar-row">
    <button id="btn-record" class="primary" style="flex:1;">▶ Record Replay</button>
    <button id="btn-stop" disabled>■ Stop</button>
  </div>
</div>

<iframe id="gen-frame" src="generator.html"></iframe>

<div class="bottom">
  <div id="log"></div>
  <details class="settings">
    <summary>⚙ ElevenLabs Settings</summary>
    <div class="body">
      <label>API Key
        <input id="el-key" type="password" placeholder="sk_…">
      </label>
      <label>Voice ID <span id="el-voice-name" style="color:var(--accent);"></span>
        <input id="el-voice" type="text" placeholder="EXAVITQu4vr4xnSDxMaL">
      </label>
      <label>Model
        <input id="el-model" type="text" value="eleven_turbo_v2_5">
      </label>
      <div style="display:flex; gap:5px;">
        <button id="el-save" type="button" style="flex:1;">Save</button>
        <button id="el-list" type="button">List Voices</button>
        <button id="el-clear" type="button">Clear Cache</button>
      </div>
      <div id="el-status" style="font-size:11px; color:var(--muted);"></div>
    </div>
  </details>
</div>

<script src="panel.js" type="module"></script>
</body>
</html>
